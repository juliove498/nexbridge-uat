<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>NexBridge OTC Desk</title>
    <link rel="icon" type="image/x-icon" href="/otc-uat/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/otc-uat/favicon-32.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Restore URL after 404.html SPA redirect
      (function(){
        var r = sessionStorage.getItem('spa_redirect');
        if (r) {
          sessionStorage.removeItem('spa_redirect');
          history.replaceState(null, '', r);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
